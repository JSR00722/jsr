<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나의 등산 기록 (Hike Log)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 기본 스타일 및 색상 (Nature & Premium) */
        :root {
            --primary: #2c3e50;
            --primary-bg: #1a252f;
            --secondary: #e67e22;
            --secondary-bright: #f39c12;
            --dark-gray: #121212;
            --medium-gray: #34495e;
            --light-gray: #95a5a6;
            --log-bg: #1e1e1e;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; 
            display: flex; flex-direction: column; 
            height: 100vh; background-color: var(--dark-gray); color: white; 
            overflow: hidden; /* 전체 화면 스크롤 방지 */
            -webkit-user-select: none; /* 텍스트 선택 방지 */
        }
        
        /* 헤더 스타일 */
        #header { 
            padding: 15px 20px; 
            background: linear-gradient(135deg, var(--primary-bg) 0%, #2980b9 100%); 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
        }
        #header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        
        /* 일자/장소 입력창 영역 */
        #inputs {
            padding: 15px 20px;
            background: var(--dark-gray);
            border-bottom: 1px solid var(--medium-gray);
            z-index: 90;
        }
        #inputs input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        #inputs input:focus {
            outline: none;
            border-color: var(--secondary-bright);
            background: rgba(255, 255, 255, 0.08);
        }
        #inputs input:last-child { margin-bottom: 0; }

        /* 지도 영역 */
        #map { flex: 1; width: 100%; z-index: 1; border-top: 1px solid var(--medium-gray); }

        /* 텍스트 로그 기록창 (지도 아래) */
        #log-container { 
            height: 25vh; /* 화면의 25% 차지 */
            overflow-y: auto; background: var(--dark-gray); 
            padding: 10px 15px; border-top: 1px solid var(--medium-gray);
            display: flex; flex-direction: column;
        }
        #logsDiv h2 { font-size: 14px; color: var(--light-gray); text-transform: uppercase; margin: 10px 0; letter-spacing: 1px; }
        .log-entry { font-size: 14px; padding: 10px 15px; border-radius: 8px; background: var(--log-bg); border: 1px solid transparent; transition: background 0.3s; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;}
        .log-entry:last-child { margin-bottom: 0; }
        .log-content { display: flex; align-items: center; }
        .log-index { color: var(--secondary-bright); font-weight: bold; margin-right: 12px; font-size: 13px;}
        .log-time { font-weight: bold; color: var(--light-gray); font-size: 13px; }
        .log-text { color: white; margin-top: 2px; }
        .log-coord { font-size: 11px; color: var(--light-gray); text-align: right; }

        /* 하단 조작 버튼 영역 (앱 바 형태로 고정) */
        #controls { 
            display: flex; padding: 15px 15px; background: var(--primary-bg);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            /* 아이폰 하단 홈 바 및 상단 노치 영역 침범 방지 */
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        button { 
            flex: 1; margin: 0 5px; padding: 18px 0; 
            font-size: 16px; font-weight: 800; border-radius: 12px; 
            border: none; color: white; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        button .btn-icon { font-size: 20px; margin-bottom: 4px; }
        
        #btn-start { background: linear-gradient(135deg, #16a085 0%, #27ae60 100%); }
        #btn-record { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); }
        #btn-end { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); }
        button:disabled { background: linear-gradient(135deg, var(--light-gray) 0%, var(--medium-gray) 100%); color: rgba(255, 255, 255, 0.4); pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <h1>나의 등산 기록 (Hike Log)</h1>
    </div>

    <div id="inputs">
        <input type="text" id="hike-date" placeholder="등산 일자 (예: 2026.06.09 화)">
        <input type="text" id="hike-location" placeholder="등산 장소 (예: 지리산 - 대나무숲 코스)">
    </div>

    <div id="map"></div>

    <div id="log-container">
        <div id="logsDiv">
            <h2>기록 리스트</h2>
            <div id="logs" style="color: var(--light-gray); text-align: center; margin-top: 20px; font-size: 14px;">출발 버튼을 누르면 기록이 시작됩니다.</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-start"><span class="btn-icon">🚀</span>출발 (Start)</button>
        <button id="btn-record" disabled><span class="btn-icon">📍</span>시간기록 (Log Point)</button>
        <button id="btn-end" disabled><span class="btn-icon">🏁</span>종료 (End)</button>
    </div>

    <script>
        const map = L.map('map').setView([36.5, 127.5], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentMarker = null;
        let routeCoords = [];
        let routeLine = L.polyline(routeCoords, {color: '#e74c3c', weight: 4}).addTo(map);
        
        let hikeLogs = []; 

        const btnStart = document.getElementById('btn-start');
        const btnRecord = document.getElementById('btn-record');
        const btnEnd = document.getElementById('btn-end');
        const logsDiv = document.getElementById('logs');
        const dateInput = document.getElementById('hike-date');
        const locationInput = document.getElementById('hike-location');

        window.onload = () => {
            const savedLogs = localStorage.getItem('hikeLogs_v2');
            if (savedLogs) {
                const savedData = JSON.parse(savedLogs);
                dateInput.value = savedData.date || '';
                locationInput.value = savedData.location || '';
                hikeLogs = savedData.logs || [];
                renderLogs();
                if (hikeLogs.length > 0 && hikeLogs[hikeLogs.length - 1].type !== '종료') {
                    btnStart.disabled = true; btnRecord.disabled = false; btnEnd.disabled = false;
                }
            }

            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => updateMap(pos.coords.latitude, pos.coords.longitude), 
                    () => {}, { enableHighAccuracy: false }
                );
            }
        };

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function updateMap(lat, lng) {
            const latlng = [lat, lng];
            map.setView(latlng, 16); 
            if (!currentMarker) currentMarker = L.marker(latlng).addTo(map);
            else currentMarker.setLatLng(latlng);
            routeCoords.push(latlng);
            routeLine.setLatLngs(routeCoords);
        }

        function saveData() {
            const dataToSave = {
                date: dateInput.value,
                location: locationInput.value,
                logs: hikeLogs
            };
            localStorage.setItem('hikeLogs_v2', JSON.stringify(dataToSave));
        }

        function saveRecord(type, lat = "", lng = "") {
            const time = getCurrentTime();
            const logItem = { type, time, lat, lng };
            if (type === '출발' && hikeLogs.length > 0 && hikeLogs[hikeLogs.length - 1].type === '종료') {
                hikeLogs = [];
                routeCoords = [];
            }
            hikeLogs.push(logItem);
            saveData(); 
            renderLogs();
        }

        function renderLogs() {
            if (hikeLogs.length === 0) {
                logsDiv.innerHTML = '<div style="color: var(--light-gray); text-align: center; margin-top: 20px; font-size: 14px;">출발 버튼을 누르면 기록이 시작됩니다.</div>';
                return;
            }
            logsDiv.innerHTML = '';
            [...hikeLogs].reverse().forEach((log, index) => {
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                const coordText = (log.lat && log.lng) ? `<div class="log-coord">${log.lat}, ${log.lng}</div>` : '';
                logEntry.innerHTML = `
                    <div class="log-content">
                        <div class="log-index">${hikeLogs.length - index}</div>
                        <div>
                            <div class="log-time">[${log.time}]</div>
                            <div class="log-text">${log.type} 지점</div>
                        </div>
                    </div>
                    ${coordText}
                `;
                logsDiv.appendChild(logEntry);
            });
        }

        function fetchLocationAndRecord(type) {
            if (!navigator.geolocation) return alert("위치 정보를 지원하지 않습니다.");
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(5);
                    const lng = position.coords.longitude.toFixed(5);
                    updateMap(lat, lng);
                    saveRecord(type, lat, lng);
                },
                (error) => alert("GPS 신호를 잡을 수 없습니다 탁 트인 곳으로 이동해 주세요."),
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        btnStart.addEventListener('click', () => {
            btnStart.disabled = true; btnRecord.disabled = false; btnEnd.disabled = false;
            fetchLocationAndRecord('출발');
        });

        btnRecord.addEventListener('click', () => {
            btnRecord.disabled = true; fetchLocationAndRecord('기록');
            setTimeout(() => { btnRecord.disabled = false; }, 2000);
        });

        btnEnd.addEventListener('click', () => {
            if(confirm("기록을 종료하시겠습니까?")) {
                btnStart.disabled = false; btnRecord.disabled = true; btnEnd.disabled = true;
                fetchLocationAndRecord('종료');
            }
        });

        // 일자/장소 입력창 변경 시에도 저장
        [dateInput, locationInput].forEach(input => {
            input.addEventListener('input', saveData);
        });
    </script>
</body>
</html>
