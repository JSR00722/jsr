<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>山行</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
    --sat: env(safe-area-inset-top,0px);
    --sab: env(safe-area-inset-bottom,0px);
    --sal: env(safe-area-inset-left,0px);
    --sar: env(safe-area-inset-right,0px);
    --glass: rgba(255,255,255,0.88);
    --glass2: rgba(255,255,255,0.96);
    --shadow: 0 4px 24px rgba(0,0,0,0.13);
    --shadow-sm: 0 2px 10px rgba(0,0,0,0.10);
    --green: #2E7D55;
    --green-light: #4CAF7D;
    --sky: #4A90D9;
    --danger: #E05252;
    --warn: #E09820;
    --text: #1A2332;
    --text-dim: #6B7A8D;
    --border: rgba(0,0,0,0.08);
    --r: 18px;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#e8efe8; }
body {
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    position:fixed; inset:0;
    max-width:560px; margin:0 auto;
}

/* ══ 지도: 화면 전체 ══ */
#map { position:absolute; inset:0; z-index:0; }

/* ══ 상단 HUD ══ */
#hud-top {
    position:absolute; top:0; left:0; right:0; z-index:10;
    padding: calc(var(--sat) + 12px) 14px 0;
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    pointer-events:none;
}
/* 좌: 타이틀 + 상태 pill */
#hud-left { display:flex; flex-direction:column; gap:6px; pointer-events:auto; }
#title-pill {
    background:var(--glass2); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-radius:14px; padding:7px 14px;
    box-shadow:var(--shadow-sm); border:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
}
#title-text { font-size:17px; font-weight:800; letter-spacing:3px; color:var(--text); }
#status-dot {
    width:8px; height:8px; border-radius:50%; background:#B0BEC5; flex-shrink:0;
    transition:background 0.3s;
}
#status-dot.active { background:#4CAF7D; box-shadow:0 0 0 3px rgba(76,175,125,0.25); animation:pulse 2s infinite; }
#status-dot.paused { background:var(--warn); box-shadow:0 0 0 3px rgba(224,152,32,0.25); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(76,175,125,0.25)} 50%{box-shadow:0 0 0 6px rgba(76,175,125,0.1)} }

#stat-pill {
    background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-radius:12px; padding:6px 12px;
    box-shadow:var(--shadow-sm); border:1px solid var(--border);
    display:none; align-items:center; gap:10px;
}
#stat-pill.show { display:flex; }
.stat-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stat-val { font-size:14px; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; }
.stat-lbl { font-size:10px; color:var(--text-dim); font-weight:500; }
.stat-sep { width:1px; height:28px; background:var(--border); }

/* 우: 메뉴 버튼 */
#hud-right { display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:auto; }
.icon-btn {
    width:42px; height:42px; border-radius:13px;
    background:var(--glass2); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border); box-shadow:var(--shadow-sm);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; color:var(--text); transition:transform 0.12s, background 0.12s;
}
.icon-btn:active { transform:scale(0.92); background:rgba(255,255,255,1); }

/* ══ 중앙 FAB (산행 중 지점기록) ══ */
#fab-record {
    position:absolute; bottom:calc(var(--sab) + 100px); left:50%; transform:translateX(-50%);
    z-index:10; display:none;
    width:72px; height:72px; border-radius:50%;
    background:linear-gradient(145deg, var(--green-light), var(--green));
    box-shadow:0 6px 28px rgba(46,125,85,0.45);
    border:3px solid rgba(255,255,255,0.6);
    align-items:center; justify-content:center; cursor:pointer;
    transition:transform 0.12s;
    flex-direction:column; gap:2px;
}
#fab-record.show { display:flex; }
#fab-record:active { transform:translateX(-50%) scale(0.93); }
#fab-record-icon { font-size:26px; line-height:1; }
#fab-record-lbl { font-size:9px; font-weight:700; color:white; opacity:0.85; letter-spacing:0.3px; }

/* ══ 하단 컨트롤 바 ══ */
#bottom-bar {
    position:absolute; bottom:0; left:0; right:0; z-index:10;
    padding:0 16px calc(var(--sab) + 12px);
}

/* 대기 중 */
#ctrl-idle { display:flex; flex-direction:column; gap:10px; }
#input-area {
    background:var(--glass2); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-radius:var(--r); padding:12px; border:1px solid var(--border);
    box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
}
#input-row { display:flex; gap:8px; }
#input-area input {
    flex:1; padding:10px 12px; background:rgba(0,0,0,0.04);
    border:1px solid var(--border); border-radius:11px;
    color:var(--text); font-size:15px; -webkit-appearance:none; appearance:none;
    outline:none; transition:border-color 0.15s;
}
#input-area input:focus { border-color:var(--green-light); }
#hike-date::-webkit-calendar-picker-indicator { opacity:0.5; cursor:pointer; }
/* 추적 모드 토글 */
#track-toggle {
    display:flex; background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;
}
.track-btn {
    flex:1; padding:8px 0; font-size:13px; font-weight:600; color:var(--text-dim);
    border:none; background:none; cursor:pointer; transition:all 0.15s;
}
.track-btn.on { background:white; color:var(--green); border-radius:9px; box-shadow:0 1px 6px rgba(0,0,0,0.1); }
.track-btn:disabled { opacity:0.4; pointer-events:none; }

#btn-start {
    padding:17px; font-size:17px; font-weight:800; border-radius:var(--r);
    border:none; color:white; cursor:pointer;
    background:linear-gradient(135deg, var(--green), var(--green-light));
    box-shadow:0 4px 20px rgba(46,125,85,0.35);
    transition:transform 0.12s, filter 0.12s;
}
#btn-start:active { transform:scale(0.98); }

/* 산행 중 — 일시정지+종료 작은 바 */
#ctrl-active {
    display:none;
    background:var(--glass2); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-radius:var(--r); padding:10px 12px; border:1px solid var(--border);
    box-shadow:var(--shadow); gap:8px; align-items:center;
}
#ctrl-active.show { display:flex; }
#timer-big {
    flex:1; font-size:22px; font-weight:800; color:var(--text);
    font-variant-numeric:tabular-nums; letter-spacing:-0.5px;
}
#timer-big.paused { color:var(--warn); }
#btn-pause {
    padding:9px 14px; border-radius:11px; border:none; cursor:pointer;
    font-size:13px; font-weight:700;
    background:rgba(224,152,32,0.12); color:var(--warn);
    transition:all 0.12s;
}
#btn-pause.on { background:rgba(76,175,125,0.12); color:var(--green); }
#btn-pause:active { transform:scale(0.95); }
#btn-end {
    padding:9px 14px; border-radius:11px; border:none; cursor:pointer;
    font-size:13px; font-weight:700;
    background:rgba(224,82,82,0.1); color:var(--danger);
    transition:all 0.12s;
}
#btn-end:active { transform:scale(0.95); }

/* ══ 메뉴 드롭다운 ══ */
#dropdown {
    position:fixed; top:calc(var(--sat) + 62px); right:14px; z-index:600;
    background:var(--glass2); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-radius:16px; border:1px solid var(--border);
    box-shadow:0 12px 40px rgba(0,0,0,0.18);
    display:none; flex-direction:column; min-width:180px; overflow:hidden;
}
#dropdown.open { display:flex; }
.dd-item {
    padding:14px 18px; font-size:15px; font-weight:500; color:var(--text);
    border:none; background:none; text-align:left; cursor:pointer;
    display:flex; align-items:center; gap:10px; transition:background 0.1s;
}
.dd-item:hover { background:rgba(0,0,0,0.04); }
.dd-item:active { background:rgba(0,0,0,0.08); }
.dd-item + .dd-item { border-top:1px solid var(--border); }
.dd-icon { font-size:16px; }
#dd-badge {
    margin-left:auto; background:var(--danger); color:white;
    font-size:11px; font-weight:700; min-width:20px; height:20px;
    border-radius:10px; display:none; align-items:center; justify-content:center; padding:0 5px;
}
#dd-new { display:none; }

/* ══ 기록 바텀시트 ══ */
#log-sheet-backdrop {
    position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0);
    display:none; transition:background 0.3s;
}
#log-sheet-backdrop.open { display:block; background:rgba(0,0,0,0.25); }
#log-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:500;
    max-width:560px; margin:0 auto;
    background:#F5F7F5; border-radius:22px 22px 0 0;
    box-shadow:0 -8px 40px rgba(0,0,0,0.15);
    transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height:78vh; display:flex; flex-direction:column;
    padding-bottom:var(--sab);
}
#log-sheet.open { transform:translateY(0); }
#sheet-handle-area {
    padding:12px 16px 0; display:flex; flex-direction:column; gap:6px; flex-shrink:0;
}
#sheet-handle { width:40px; height:4px; background:#C8D0C8; border-radius:2px; margin:0 auto; }
#sheet-header { display:flex; justify-content:space-between; align-items:center; padding-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.07); }
#sheet-title { font-size:16px; font-weight:700; color:var(--text); }
#sheet-meta { font-size:13px; color:var(--text-dim); }
#sheet-close { background:rgba(0,0,0,0.07); border:none; width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); }

/* 기록 리스트 — 스크롤바 숨김 */
#log-scroll {
    overflow-y:auto; flex:1; padding:8px 12px 12px;
    scrollbar-width:none;
}
#log-scroll::-webkit-scrollbar { display:none; }
#log-empty { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:15px; }

/* 타임라인 스타일 기록 */
.log-entry {
    display:flex; align-items:flex-start; gap:10px; padding:7px 0;
    position:relative;
}
.log-entry + .log-entry::before {
    content:''; position:absolute; left:15px; top:-7px;
    width:1.5px; height:7px; background:#D8E0D8;
}
.log-dot {
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:13px;
    margin-top:1px;
}
.dot-출발  { background:rgba(76,175,125,0.15); }
.dot-기록  { background:rgba(74,144,217,0.15); }
.dot-일시정지 { background:rgba(224,152,32,0.15); }
.dot-재개  { background:rgba(76,175,125,0.12); }
.dot-종료  { background:rgba(224,82,82,0.12); }
.log-body { flex:1; min-width:0; }
.log-top { display:flex; align-items:center; gap:6px; }
.log-type { font-size:13px; font-weight:700; color:var(--text); }
.log-time { font-size:12px; color:var(--text-dim); font-variant-numeric:tabular-nums; }
.log-memo { font-size:13px; color:var(--text-dim); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-coord { font-size:11px; color:#A0AABA; margin-top:1px; }
.btn-del {
    background:none; border:none; color:#C0C8C0; cursor:pointer;
    font-size:16px; padding:4px 6px; flex-shrink:0; transition:color 0.15s;
    min-width:28px; min-height:28px; display:flex; align-items:center; justify-content:center;
}
.btn-del:active { color:var(--danger); }

/* ══ 이력 패널 ══ */
#history-panel {
    position:fixed; inset:0; z-index:700; background:rgba(0,0,0,0.4);
    display:none; align-items:flex-end;
}
#history-panel.open { display:flex; }
#history-sheet {
    width:100%; max-width:560px; margin:0 auto;
    background:#F5F7F5; border-radius:22px 22px 0 0;
    max-height:78vh; display:flex; flex-direction:column;
    padding-bottom:var(--sab);
}
#history-handle-area { padding:12px 16px 0; flex-shrink:0; }
#history-handle { width:40px; height:4px; background:#C8D0C8; border-radius:2px; margin:0 auto 10px; }
#history-header { display:flex; justify-content:space-between; align-items:center; padding-bottom:10px; border-bottom:1px solid rgba(0,0,0,0.07); }
#history-title { font-size:16px; font-weight:700; color:var(--text); }
#history-close { background:rgba(0,0,0,0.07); border:none; width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); }
#history-scroll {
    overflow-y:auto; flex:1; padding:8px 12px 12px;
    scrollbar-width:none;
}
#history-scroll::-webkit-scrollbar { display:none; }
.h-item {
    padding:12px 14px; border-radius:14px; background:white;
    margin-bottom:8px; box-shadow:0 1px 6px rgba(0,0,0,0.06); cursor:pointer;
    transition:transform 0.1s;
}
.h-item:active { transform:scale(0.98); }
.h-item-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.h-item-name { font-size:15px; font-weight:700; color:var(--text); }
.h-item-date { font-size:12px; color:var(--text-dim); }
.h-item-stats { display:flex; gap:12px; flex-wrap:wrap; }
.h-item-stat { font-size:12px; color:var(--text-dim); }
.h-item-stat b { color:var(--green); font-weight:700; }
.btn-del-h { background:none; border:none; color:#C0C8C0; font-size:16px; cursor:pointer; margin-left:6px; }
.btn-del-h:active { color:var(--danger); }

/* ══ 지도 위 레이어 버튼 ══ */
#map-layer-btn {
    position:absolute; bottom:calc(var(--sab) + 96px); right:16px; z-index:10;
    width:42px; height:42px; border-radius:13px;
    background:var(--glass2); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border); box-shadow:var(--shadow-sm);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; font-weight:700; color:var(--text);
    transition:transform 0.12s;
}
#map-layer-btn:active { transform:scale(0.92); }

/* 기록 보기 버튼 (지도 위) */
#btn-show-logs {
    position:absolute; bottom:calc(var(--sab) + 148px); right:16px; z-index:10;
    width:42px; height:42px; border-radius:13px;
    background:var(--glass2); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border); box-shadow:var(--shadow-sm);
    display:none; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; transition:transform 0.12s;
}
#btn-show-logs.show { display:flex; }
#btn-show-logs:active { transform:scale(0.92); }
#log-badge {
    position:absolute; top:-5px; right:-5px;
    background:var(--green); color:white; font-size:10px; font-weight:800;
    width:18px; height:18px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    border:2px solid white;
}

/* 현재위치 점 */
.loc-dot {
    width:14px; height:14px; border-radius:50%;
    background:#2979FF; border:3px solid white;
    box-shadow:0 0 0 4px rgba(41,121,255,0.2);
}

/* @supports 폴백 */
@supports not (backdrop-filter:blur(1px)) {
    #title-pill,#stat-pill,.icon-btn,#input-area,#ctrl-active,#dropdown { background:rgba(255,255,255,0.97); }
    #map-layer-btn,#btn-show-logs { background:rgba(255,255,255,0.97); }
}
@media (prefers-reduced-motion:reduce) {
    #status-dot.active { animation:none; }
    * { transition-duration:0.01ms !important; }
}
@media (max-height:500px) and (orientation:landscape) {
    #fab-record { bottom:calc(var(--sab) + 76px); width:60px; height:60px; }
    #fab-record-icon { font-size:22px; }
    #fab-record-lbl { display:none; }
    #ctrl-active { padding:8px 10px; }
    #timer-big { font-size:18px; }
    #ctrl-idle { gap:8px; }
    #input-area { padding:8px; }
    #map-layer-btn { bottom:calc(var(--sab) + 72px); }
    #btn-show-logs { bottom:calc(var(--sab) + 118px); }
}
</style>
</head>
<body>

<!-- 지도 -->
<div id="map"></div>

<!-- 상단 HUD -->
<div id="hud-top">
    <div id="hud-left">
        <div id="title-pill">
            <div id="status-dot"></div>
            <span id="title-text">山行</span>
        </div>
        <div id="stat-pill">
            <div class="stat-item">
                <span class="stat-val" id="stat-dist">0.00</span>
                <span class="stat-lbl">km</span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-val" id="stat-pts">0</span>
                <span class="stat-lbl">지점</span>
            </div>
        </div>
    </div>
    <div id="hud-right">
        <div class="icon-btn" onclick="toggleDropdown()">···</div>
    </div>
</div>

<!-- 지도 위 레이어/기록 버튼 -->
<button id="map-layer-btn" onclick="toggleMapLayer()">🗺</button>
<div id="btn-show-logs" onclick="openLogSheet()">
    📋
    <div id="log-badge" style="display:none"></div>
</div>

<!-- 중앙 FAB -->
<div id="fab-record" onclick="onFabRecord()">
    <span id="fab-record-icon">📍</span>
    <span id="fab-record-lbl">기록</span>
</div>

<!-- 하단 바 -->
<div id="bottom-bar">
    <!-- 대기 중 -->
    <div id="ctrl-idle">
        <div id="input-area">
            <div id="input-row">
                <input type="date" id="hike-date">
                <input type="text" id="hike-location" placeholder="산 이름">
            </div>
            <div id="track-toggle">
                <button class="track-btn on" id="btn-mode-manual" onclick="setTrackMode('manual')">✋ 수동</button>
                <button class="track-btn" id="btn-mode-realtime" onclick="setTrackMode('realtime')">📡 실시간</button>
            </div>
        </div>
        <button id="btn-start">🥾 산행 출발</button>
    </div>
    <!-- 산행 중 -->
    <div id="ctrl-active">
        <span id="timer-big">00:00:00</span>
        <button id="btn-pause" onclick="onPauseClick()">⏸ 정지</button>
        <button id="btn-end" onclick="onEndClick()">🏁 종료</button>
    </div>
</div>

<!-- 드롭다운 -->
<div id="dropdown">
    <button class="dd-item" onclick="ddAction('history')"><span class="dd-icon">🗂</span>보관함<span id="dd-badge"></span></button>
    <button class="dd-item" onclick="ddAction('export')"><span class="dd-icon">📊</span>내보내기</button>
    <button class="dd-item" id="dd-new" onclick="ddAction('new')"><span class="dd-icon">🔄</span>새 산행</button>
</div>
<div id="dd-bd" onclick="closeDropdown()" style="display:none;position:fixed;inset:0;z-index:599"></div>

<!-- 기록 바텀시트 -->
<div id="log-sheet-backdrop" onclick="closeLogSheet()"></div>
<div id="log-sheet">
    <div id="sheet-handle-area">
        <div id="sheet-handle"></div>
        <div id="sheet-header">
            <span id="sheet-title">기록</span>
            <span id="sheet-meta"></span>
            <button id="sheet-close" onclick="closeLogSheet()">×</button>
        </div>
    </div>
    <div id="log-scroll">
        <div id="log-empty">아직 기록이 없습니다</div>
        <div id="logs"></div>
    </div>
</div>

<!-- 이력 패널 -->
<div id="history-panel" onclick="onHistoryBdClick(event)">
    <div id="history-sheet">
        <div id="history-handle-area">
            <div id="history-handle"></div>
            <div id="history-header">
                <span id="history-title">보관된 산행</span>
                <button id="history-close" onclick="closeHistory()">×</button>
            </div>
        </div>
        <div id="history-scroll"><div id="history-list"></div></div>
    </div>
</div>

<script>
/* ══ 지도 ══ */
const map = L.map('map',{zoomControl:false}).setView([36.5,127.5],7);
L.control.zoom({position:'bottomleft'}).addTo(map);
const tileNormal    = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
const tileSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
tileNormal.addTo(map);
let isSat = false;

window.toggleMapLayer = function(){
    if(isSat){map.removeLayer(tileSatellite);tileNormal.addTo(map);document.getElementById('map-layer-btn').textContent='🗺';}
    else{map.removeLayer(tileNormal);tileSatellite.addTo(map);document.getElementById('map-layer-btn').textContent='🛰';}
    isSat=!isSat;
};
if(window.visualViewport) window.visualViewport.addEventListener('resize',()=>map.invalidateSize());
function alignBody(){
    const maxW=560,vw=window.innerWidth,o=vw>maxW?Math.floor((vw-maxW)/2):0;
    document.body.style.left=o+'px'; document.body.style.right=o+'px';
}
alignBody();
window.addEventListener('resize',()=>{alignBody();map.invalidateSize();});

/* ══ 상태 ══ */
let curMarker=null, locDot=null, locCircle=null;
let routeCoords=[], rtCoords=[];
let routeLine   = L.polyline([],{color:'#2E7D55',weight:4,opacity:0.8}).addTo(map);
let rtLine      = L.polyline([],{color:'#E09820',weight:3,opacity:0.7,dashArray:'6 4'}).addTo(map);
let curHike     = {date:'',location:'',logs:[]};
let hikeHistory = [];

/* 타이머 */
let timerIv=null, startTs=null, pausedMs=0, isPaused=false;

/* 자동 일시정지 */
const AUTO_MS = 30*60*1000;
let lastMoveT=null, wasAutoPaused=false;

/* 추적 */
let trackMode='manual', watchId=null, lastWatchCoord=null, rtDist=0;
let idleWatchId=null, idleLastCoord=null;
let screenHidden=false;

/* DOM */
const $start    = document.getElementById('btn-start');
const $pause    = document.getElementById('btn-pause');
const $end      = document.getElementById('btn-end');
const $dateInp  = document.getElementById('hike-date');
const $locInp   = document.getElementById('hike-location');
const $logsDiv  = document.getElementById('logs');
const $statusDot= document.getElementById('status-dot');
const $timerBig = document.getElementById('timer-big');
const $ctrlIdle = document.getElementById('ctrl-idle');
const $ctrlAct  = document.getElementById('ctrl-active');
const $fab      = document.getElementById('fab-record');
const $statPill = document.getElementById('stat-pill');

/* ══ 모드 선택 ══ */
window.setTrackMode = function(m){
    if($ctrlAct.classList.contains('show')) return;
    trackMode=m;
    document.getElementById('btn-mode-manual').classList.toggle('on',m==='manual');
    document.getElementById('btn-mode-realtime').classList.toggle('on',m==='realtime');
    localStorage.setItem('hikeApp_trackMode',m);
};

/* ══ 드롭다운 ══ */
window.toggleDropdown=function(){
    const dd=document.getElementById('dropdown'),bd=document.getElementById('dd-bd');
    const open=dd.classList.contains('open');
    dd.classList.toggle('open',!open); bd.style.display=open?'none':'block';
};
window.closeDropdown=function(){
    document.getElementById('dropdown').classList.remove('open');
    document.getElementById('dd-bd').style.display='none';
};
window.ddAction=function(a){
    closeDropdown();
    if(a==='history') openHistory();
    else if(a==='export') doExport();
    else if(a==='new') doNewHike();
};

/* ══ 유틸 ══ */
function nowTime(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});}
function hav(la1,lo1,la2,lo2){
    const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcDist(logs){
    let t=0; const pts=logs.filter(l=>l.lat&&l.lng);
    for(let i=1;i<pts.length;i++) t+=hav(+pts[i-1].lat,+pts[i-1].lng,+pts[i].lat,+pts[i].lng);
    return t;
}
function refreshStats(){
    const dist=trackMode==='realtime'?rtDist:calcDist(curHike.logs);
    document.getElementById('stat-dist').textContent=dist.toFixed(2);
    document.getElementById('stat-pts').textContent=curHike.logs.length;
    /* 기록 배지 */
    const n=curHike.logs.length;
    const badge=document.getElementById('log-badge');
    badge.textContent=n; badge.style.display=n>0?'flex':'none';
}
function refreshHistoryBadge(){
    const b=document.getElementById('dd-badge');
    b.textContent=hikeHistory.length; b.style.display=hikeHistory.length>0?'flex':'none';
}
function save(){
    curHike.date=$dateInp.value; curHike.location=$locInp.value;
    localStorage.setItem('hikeApp_current',JSON.stringify(curHike));
    if(startTs) localStorage.setItem('hikeApp_startTs',startTs.toString());
    localStorage.setItem('hikeApp_pausedMs',pausedMs.toString());
}

/* ══ 타이머 ══ */
function startTimer(ts,pm){
    startTs=ts||Date.now(); pausedMs=pm||0; isPaused=false;
    $timerBig.classList.remove('paused');
    _tickStart();
    document.removeEventListener('visibilitychange',onVis);
    document.addEventListener('visibilitychange',onVis);
}
function _tickStart(){
    if(timerIv) clearInterval(timerIv);
    timerIv=setInterval(()=>{
        const e=pausedMs+Math.floor((Date.now()-startTs)/1000);
        $timerBig.textContent=`${String(Math.floor(e/3600)).padStart(2,'0')}:${String(Math.floor(e%3600/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
    },1000);
}
function pauseTimer(){
    if(isPaused) return; isPaused=true;
    pausedMs+=Math.floor((Date.now()-startTs)/1000);
    clearInterval(timerIv); timerIv=null;
    $timerBig.classList.add('paused'); startTs=null;
    localStorage.setItem('hikeApp_pausedMs',pausedMs.toString());
    localStorage.removeItem('hikeApp_startTs');
}
function resumeTimer(){
    if(!isPaused) return; isPaused=false;
    startTs=Date.now(); $timerBig.classList.remove('paused'); _tickStart();
    localStorage.setItem('hikeApp_startTs',startTs.toString());
}
function stopTimer(){
    clearInterval(timerIv); timerIv=null;
    document.removeEventListener('visibilitychange',onVis);
    $timerBig.textContent='00:00:00'; $timerBig.classList.remove('paused');
    startTs=null; pausedMs=0; isPaused=false; lastMoveT=null; wasAutoPaused=false;
    localStorage.removeItem('hikeApp_startTs'); localStorage.removeItem('hikeApp_pausedMs');
}
function onVis(){
    if(document.hidden){
        screenHidden=true;
        if(!isPaused&&timerIv){clearInterval(timerIv);timerIv=null;}
        /* 실시간: 화면 꺼지면 GPS 중단 */
        if(trackMode==='realtime'&&!isPaused&&watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
    } else {
        screenHidden=false;
        if(!isPaused&&startTs) _tickStart();
        if(trackMode==='realtime'&&!isPaused&&watchId===null) startWatch();
        /* 화면 켜질 때 밀린 렌더링 */
        renderLogsFull(); refreshStats();
        if(trackMode==='realtime') rtLine.setLatLngs(rtCoords);
        if(wasAutoPaused){wasAutoPaused=false;setTimeout(()=>alert('30분 이상 이동이 없어 자동 일시정지되었습니다.\n재개 버튼을 눌러 계속하세요.'),200);}
    }
}

/* ══ GPS 추적 ══ */
function startWatch(){
    if(!navigator.geolocation||watchId!==null) return;
    watchId=navigator.geolocation.watchPosition(onWatch,e=>console.warn(e.message),{enableHighAccuracy:true,timeout:10000,maximumAge:5000});
}
function stopWatch(){if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}}
function onWatch(pos){
    const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
    if(!screenHidden) updateLocDot(lat,lng,acc);
    if(isPaused) return;
    if(lastWatchCoord){
        const d=hav(lastWatchCoord[0],lastWatchCoord[1],lat,lng)*1000;
        if(d<5){
            if(lastMoveT&&Date.now()-lastMoveT>=AUTO_MS){wasAutoPaused=true;doPause();if(!screenHidden){wasAutoPaused=false;setTimeout(()=>alert('30분 이상 이동이 없어 자동 일시정지되었습니다.\n재개 버튼을 눌러 계속하세요.'),200);}}
            return;
        }
        rtDist+=hav(lastWatchCoord[0],lastWatchCoord[1],lat,lng);
    }
    lastMoveT=Date.now(); lastWatchCoord=[lat,lng]; rtCoords.push([lat,lng]);
    if(!screenHidden){rtLine.setLatLngs(rtCoords);refreshStats();if(!userDragged)map.setView([lat,lng],map.getZoom());}
}
function startIdle(){
    if(!navigator.geolocation||idleWatchId!==null) return;
    idleWatchId=navigator.geolocation.watchPosition(pos=>{
        if(isPaused) return;
        const lat=pos.coords.latitude,lng=pos.coords.longitude;
        if(idleLastCoord){
            const d=hav(idleLastCoord[0],idleLastCoord[1],lat,lng)*1000;
            if(d>=5){lastMoveT=Date.now();idleLastCoord=[lat,lng];return;}
        } else {idleLastCoord=[lat,lng];lastMoveT=Date.now();return;}
        if(lastMoveT&&Date.now()-lastMoveT>=AUTO_MS){wasAutoPaused=true;doPause();if(!screenHidden){wasAutoPaused=false;setTimeout(()=>alert('30분 이상 이동이 없어 자동 일시정지되었습니다.\n재개 버튼을 눌러 계속하세요.'),200);}}
    },e=>console.warn(e.message),{enableHighAccuracy:false,timeout:15000,maximumAge:60000});
}
function stopIdle(){if(idleWatchId!==null){navigator.geolocation.clearWatch(idleWatchId);idleWatchId=null;}idleLastCoord=null;}

/* ══ 현재 위치 점 ══ */
function updateLocDot(lat,lng,acc){
    if(!locDot){
        const icon=L.divIcon({className:'',html:'<div class="loc-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]});
        locDot=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
        locCircle=L.circle([lat,lng],{radius:acc,color:'#2979FF',fillColor:'#2979FF',fillOpacity:0.07,weight:1}).addTo(map);
    } else {locDot.setLatLng([lat,lng]);locCircle.setLatLng([lat,lng]);locCircle.setRadius(acc);}
}
function clearLocDot(){
    if(locDot){map.removeLayer(locDot);locDot=null;}
    if(locCircle){map.removeLayer(locCircle);locCircle=null;}
}

/* ══ 일시정지 / 재개 ══ */
function doPause(){
    if(isPaused) return;
    pauseTimer();
    if(trackMode==='realtime') stopWatch(); else stopIdle();
    recordPoint('일시정지','','',wasAutoPaused?'자동 일시정지':'');
    $pause.textContent='▶ 재개'; $pause.classList.add('on');
    $statusDot.className='paused';
    $fab.style.display='none';
}
function doResume(){
    if(!isPaused) return;
    resumeTimer(); lastMoveT=Date.now();
    if(trackMode==='realtime') startWatch(); else {idleLastCoord=null;startIdle();}
    recordPoint('재개','','','');
    $pause.textContent='⏸ 정지'; $pause.classList.remove('on');
    $statusDot.className='active';
    $fab.classList.add('show');
}
function onPauseClick(){if(!isPaused)doPause();else doResume();}

/* ══ 상태 전환 ══ */
let userDragged=false;
map.on('dragstart',()=>{userDragged=true;});

function setActive(on){
    $statusDot.className=on?'active':'';
    $ctrlIdle.style.display=on?'none':'flex';
    $ctrlAct.classList.toggle('show',on);
    $fab.classList.toggle('show',on&&!isPaused);
    $statPill.classList.toggle('show',on);
    document.getElementById('btn-show-logs').classList.toggle('show',on);
    document.getElementById('btn-mode-manual').disabled=on;
    document.getElementById('btn-mode-realtime').disabled=on;
    document.getElementById('dd-new').style.display=(!on&&curHike.logs.length>0)?'flex':'none';
    setTimeout(()=>map.invalidateSize(),50);
}

/* ══ 지도 마커 ══ */
function updateMap(lat,lng){
    if(!curMarker){curMarker=L.marker([lat,lng]).addTo(map);map.setView([lat,lng],16);userDragged=false;}
    else{curMarker.setLatLng([lat,lng]);if(!userDragged)map.setView([lat,lng],map.getZoom());}
    routeCoords.push([lat,lng]); routeLine.setLatLngs(routeCoords);
}

/* ══ 기록 ══ */
function recordPoint(type,lat='',lng='',memo=''){
    curHike.logs.push({id:Date.now(),type,time:nowTime(),lat,lng,memo});
    save();
    if(!screenHidden){prependLog(curHike.logs[curHike.logs.length-1]);refreshStats();}
    document.getElementById('dd-new').style.display=curHike.logs.length>0?'flex':'none';
}
function fetchAndRecord(type,memo=''){
    if(!navigator.geolocation) return alert('위치 정보 미지원');
    navigator.geolocation.getCurrentPosition(
        pos=>{
            const lat=pos.coords.latitude.toFixed(5),lng=pos.coords.longitude.toFixed(5);
            updateMap(parseFloat(lat),parseFloat(lng)); recordPoint(type,lat,lng,memo);
        },
        ()=>{alert('GPS 신호 없음. 좌표 없이 기록합니다.');recordPoint(type,'',memo);},
        {enableHighAccuracy:true,timeout:7000,maximumAge:30000}
    );
}
function onFabRecord(){
    if(isPaused) return;
    const memo=prompt('지점 메모 (예: 삼거리, 정상)','');
    if(memo===null) return;
    fetchAndRecord('기록',memo);
}

/* ══ 기록 렌더링 (타임라인) ══ */
const TYPE_ICON={'출발':'🟢','기록':'🔵','일시정지':'🟡','재개':'🟢','종료':'🔴'};
const TYPE_MEMO={'출발':'산행 시작','종료':'산행 종료','일시정지':'기록 일시정지','재개':'기록 재개'};
function prependLog(log){
    document.getElementById('log-empty').style.display='none';
    const el=_makeLogEl(log);
    $logsDiv.insertBefore(el,$logsDiv.firstChild);
    /* 시트 메타 갱신 */
    document.getElementById('sheet-meta').textContent=curHike.logs.length+'개';
}
function renderLogsFull(){
    $logsDiv.innerHTML='';
    const empty=document.getElementById('log-empty');
    if(curHike.logs.length===0){empty.style.display='block';return;}
    empty.style.display='none';
    document.getElementById('sheet-meta').textContent=curHike.logs.length+'개';
    [...curHike.logs].reverse().forEach(log=>$logsDiv.appendChild(_makeLogEl(log)));
}
function _makeLogEl(log){
    const el=document.createElement('div'); el.className='log-entry'; el.dataset.id=log.id;
    const memo=log.memo||(TYPE_MEMO[log.type]||'지점');
    const coord=(log.lat&&log.lng)?`${(+log.lat).toFixed(4)}, ${(+log.lng).toFixed(4)}`:'';
    el.innerHTML=`
        <div class="log-dot dot-${log.type}">${TYPE_ICON[log.type]||'⚪'}</div>
        <div class="log-body">
            <div class="log-top">
                <span class="log-type">${log.type}</span>
                <span class="log-time">${log.time}</span>
            </div>
            <div class="log-memo">${memo}</div>
            ${coord?`<div class="log-coord">${coord}</div>`:''}
        </div>
        <button class="btn-del" onclick="deleteLog(${log.id})" aria-label="삭제">×</button>`;
    return el;
}

/* ══ 기록 시트 ══ */
window.openLogSheet=function(){
    document.getElementById('log-sheet-backdrop').classList.add('open');
    document.getElementById('log-sheet').classList.add('open');
};
window.closeLogSheet=function(){
    document.getElementById('log-sheet-backdrop').classList.remove('open');
    document.getElementById('log-sheet').classList.remove('open');
};

/* ══ 삭제 ══ */
window.deleteLog=function(id){
    if(!confirm('이 기록을 삭제하시겠습니까?')) return;
    curHike.logs=curHike.logs.filter(l=>l.id!==id);
    routeCoords=[]; curHike.logs.forEach(l=>{if(l.lat&&l.lng)routeCoords.push([+l.lat,+l.lng]);});
    routeLine.setLatLngs(routeCoords);
    if(routeCoords.length>0&&curMarker) curMarker.setLatLng(routeCoords[routeCoords.length-1]);
    else if(curMarker&&routeCoords.length===0){map.removeLayer(curMarker);curMarker=null;}
    save(); renderLogsFull(); refreshStats();
    document.getElementById('dd-new').style.display=curHike.logs.length>0?'flex':'none';
};

/* ══ 이력 패널 ══ */
function openHistory(){
    renderHistoryList();
    document.getElementById('history-panel').classList.add('open');
}
window.closeHistory=function(){document.getElementById('history-panel').classList.remove('open');};
window.onHistoryBdClick=function(e){if(e.target===document.getElementById('history-panel'))closeHistory();};
function renderHistoryList(){
    const list=document.getElementById('history-list');
    if(hikeHistory.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:#6B7A8D;font-size:15px;">저장된 산행이 없습니다</div>';return;}
    list.innerHTML='';
    [...hikeHistory].reverse().forEach((hike,ri)=>{
        const i=hikeHistory.length-1-ri;
        const dist=calcDist(hike.logs);
        const s=hike.logs.find(l=>l.type==='출발'), e=hike.logs.find(l=>l.type==='종료');
        const el=document.createElement('div'); el.className='h-item';
        el.innerHTML=`
            <div class="h-item-top">
                <span class="h-item-name">${hike.location||'이름없음'}</span>
                <div style="display:flex;align-items:center;gap:4px">
                    <span class="h-item-date">${hike.date}</span>
                    <button class="btn-del-h" onclick="delHistory(${i},event)">×</button>
                </div>
            </div>
            <div class="h-item-stats">
                <span class="h-item-stat">지점 <b>${hike.logs.length}개</b></span>
                <span class="h-item-stat">거리 <b>${dist.toFixed(2)}km</b></span>
                ${s?`<span class="h-item-stat">출발 <b>${s.time}</b></span>`:''}
                ${e?`<span class="h-item-stat">종료 <b>${e.time}</b></span>`:''}
            </div>`;
        list.appendChild(el);
    });
}
window.delHistory=function(i,e){
    e.stopPropagation();
    if(!confirm('이 기록을 영구 삭제하시겠습니까?')) return;
    hikeHistory.splice(i,1);
    localStorage.setItem('hikeApp_history',JSON.stringify(hikeHistory));
    refreshHistoryBadge(); renderHistoryList();
};

/* ══ 내보내기 ══ */
function doExport(){
    const all=[...hikeHistory]; if(curHike.logs.length>0) all.push(curHike);
    if(all.length===0) return alert('데이터가 없습니다.');
    let csv='\uFEFF구분,일자,장소,시간,메모,위도,경도,거리누적km\n';
    all.forEach(hike=>{
        let cum=0;
        hike.logs.forEach((log,i)=>{
            if(i>0&&log.lat&&log.lng){const prev=hike.logs.slice(0,i).reverse().find(l=>l.lat&&l.lng);if(prev)cum+=hav(+prev.lat,+prev.lng,+log.lat,+log.lng);}
            csv+=`${log.type},${hike.date},${hike.location||'미입력'},${log.time},${log.memo||''},${log.lat||''},${log.lng||''},${cum.toFixed(3)}\n`;
        });
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`산행기록_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

/* ══ 리셋 ══ */
function resetHike(){
    stopWatch(); stopIdle(); clearLocDot();
    routeCoords=[]; rtCoords=[]; rtDist=0; lastWatchCoord=null; idleLastCoord=null;
    routeLine.setLatLngs([]);
    map.removeLayer(rtLine);
    rtLine=L.polyline([],{color:'#E09820',weight:3,opacity:0.7,dashArray:'6 4'}).addTo(map);
    if(curMarker){map.removeLayer(curMarker);curMarker=null;}
}

/* ══ 새 산행 ══ */
function doNewHike(){
    if(curHike.logs.length===0) return alert('저장할 기록이 없습니다.');
    if(!confirm('현재 기록을 보관함에 저장하고 새 산행을 시작합니까?')) return;
    hikeHistory.push(JSON.parse(JSON.stringify(curHike)));
    localStorage.setItem('hikeApp_history',JSON.stringify(hikeHistory));
    refreshHistoryBadge();
    curHike={date:$dateInp.value,location:'',logs:[]};
    localStorage.removeItem('hikeApp_current'); $locInp.value='';
    resetHike(); stopTimer(); setActive(false);
    $logsDiv.innerHTML=''; document.getElementById('log-empty').style.display='block';
    refreshStats(); closeLogSheet();
}

/* ══ 버튼 이벤트 ══ */
$start.addEventListener('click',()=>{
    if(curHike.logs.length>0){
        if(!confirm('이전 기록이 있습니다. 보관함에 저장하고 새로 시작합니까?')) return;
        hikeHistory.push(JSON.parse(JSON.stringify(curHike)));
        localStorage.setItem('hikeApp_history',JSON.stringify(hikeHistory));
        refreshHistoryBadge();
        curHike={date:$dateInp.value,location:'',logs:[]};
        localStorage.removeItem('hikeApp_current'); $locInp.value='';
        resetHike(); $logsDiv.innerHTML=''; document.getElementById('log-empty').style.display='block'; refreshStats();
    }
    setActive(true); startTimer(); lastMoveT=Date.now();
    if(trackMode==='realtime') startWatch(); else startIdle();
    fetchAndRecord('출발');
});

function onEndClick(){
    if(!confirm('산행을 종료하시겠습니까?')) return;
    $end.style.pointerEvents='none'; $pause.style.pointerEvents='none';
    wasAutoPaused=false; if(isPaused) isPaused=false;
    stopWatch(); stopIdle();
    navigator.geolocation.getCurrentPosition(
        pos=>{
            updateMap(parseFloat(pos.coords.latitude.toFixed(5)),parseFloat(pos.coords.longitude.toFixed(5)));
            recordPoint('종료',pos.coords.latitude.toFixed(5),pos.coords.longitude.toFixed(5),'');
            _finishEnd();
        },
        ()=>{alert('GPS 없음. 좌표 없이 기록합니다.');recordPoint('종료','','','');_finishEnd();},
        {enableHighAccuracy:true,timeout:7000,maximumAge:30000}
    );
}
function _finishEnd(){
    clearLocDot(); setActive(false); stopTimer();
    $end.style.pointerEvents=''; $pause.style.pointerEvents='';
    $pause.textContent='⏸ 정지'; $pause.classList.remove('on');
    renderLogsFull(); refreshStats();
}

[$dateInp,$locInp].forEach(el=>el.addEventListener('input',save));

/* ══ 초기화 ══ */
window.onload=()=>{
    $dateInp.value=new Date().toISOString().split('T')[0];
    const savedMode=localStorage.getItem('hikeApp_trackMode')||'manual';
    setTrackMode(savedMode);
    const sh=localStorage.getItem('hikeApp_history');
    if(sh) hikeHistory=JSON.parse(sh);
    refreshHistoryBadge();
    const sc=localStorage.getItem('hikeApp_current');
    if(sc){
        curHike=JSON.parse(sc);
        if(curHike.date) $dateInp.value=curHike.date;
        $locInp.value=curHike.location||'';
        curHike.logs.forEach(l=>{if(l.lat&&l.lng) routeCoords.push([+l.lat,+l.lng]);});
        if(routeCoords.length>0){
            map.setView(routeCoords[routeCoords.length-1],16);
            curMarker=L.marker(routeCoords[routeCoords.length-1]).addTo(map);
            routeLine.setLatLngs(routeCoords);
        }
        renderLogsFull(); refreshStats();
        const last=curHike.logs[curHike.logs.length-1];
        if(last&&last.type!=='종료'){
            setActive(true);
            const sTs=localStorage.getItem('hikeApp_startTs');
            const sPm=parseInt(localStorage.getItem('hikeApp_pausedMs')||'0');
            if(last.type==='일시정지'){
                pausedMs=sPm; isPaused=true; startTs=null;
                $timerBig.classList.add('paused');
                const e=sPm; $timerBig.textContent=`${String(Math.floor(e/3600)).padStart(2,'0')}:${String(Math.floor(e%3600/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
                $statusDot.className='paused';
                $pause.textContent='▶ 재개'; $pause.classList.add('on');
                $fab.classList.remove('show');
                document.removeEventListener('visibilitychange',onVis);
                document.addEventListener('visibilitychange',onVis);
            } else {
                startTimer(sTs?parseInt(sTs):Date.now(),sPm);
                lastMoveT=Date.now();
                if(trackMode==='realtime') startWatch(); else startIdle();
            }
        } else setActive(false);
    } else {
        setActive(false);
        navigator.geolocation&&navigator.geolocation.getCurrentPosition(
            pos=>map.setView([pos.coords.latitude,pos.coords.longitude],15),
            ()=>{},{enableHighAccuracy:false}
        );
    }
    refreshStats();
};
</script>
