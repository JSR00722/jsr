<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>등산 기록</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #f39c12;
            --text: #ffffff;
            --text-dim: #95a5a6;
            --border: #34495e;
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; 
            display: flex; flex-direction: column; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; 
        }
        
        /* 1. 상단바 컴팩트화 (공간 절약) */
        #header { 
            padding: 10px 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        #header h1 { margin: 0; font-size: 16px; font-weight: bold; }
        .head-btn { 
            background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 8px; border-radius: 6px; font-size: 11px; cursor: pointer;
        }

        /* 2. 입력 영역 한 줄로 배치 (지도 공간 확보) */
        #inputs { 
            display: flex; gap: 8px; padding: 8px 15px; background: var(--bg); z-index: 90; border-bottom: 1px solid var(--border);
        }
        #inputs input {
            flex: 1; padding: 8px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 13px; box-sizing: border-box;
        }
        #inputs input:focus { outline: none; border-color: var(--accent); }
        /* 달력 커스텀 스타일링 */
        #hike-date::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* 3. 지도 영역 극대화 (화면의 약 50% 차지) */
        #map { flex: 1; width: 100%; z-index: 1; }

        /* 4. 기록창 크기 및 레이아웃 최적화 */
        #log-container { 
            height: 30vh; overflow-y: auto; background: var(--bg); padding: 10px 15px; border-top: 1px solid var(--border);
        }
        #log-container h2 { font-size: 12px; color: var(--text-dim); margin: 0 0 8px 0; display: flex; justify-content: space-between; }
        
        /* 한 줄로 간결해진 기록 리스트 */
        .log-entry { 
            font-size: 13px; padding: 8px 10px; border-radius: 6px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
        }
        .log-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .log-type { font-weight: bold; color: var(--accent); min-width: 30px; }
        .log-time { color: var(--text-dim); font-size: 12px; }
        .log-memo { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-right { display: flex; align-items: center; gap: 10px; margin-left: 10px; }
        .log-coord { font-size: 11px; color: var(--text-dim); }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; padding: 0 5px; }

        /* 5. 하단 버튼 영역 간결화 */
        #controls { 
            display: flex; padding: 10px; background: var(--panel); padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; gap: 6px;
        }
        .main-btn { 
            flex: 1; padding: 12px 0; font-size: 14px; font-weight: bold; border-radius: 8px; border: none; color: white; cursor: pointer; text-align: center;
        }
        #btn-start { background: #27ae60; }
        #btn-record { background: #2980b9; }
        #btn-end { background: #c0392b; }
        .main-btn:disabled { background: #34495e; color: rgba(255,255,255,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <h1>⛰️ 등산 기록</h1>
        <div id="header-buttons">
            <button class="head-btn" id="btn-new">새 산행</button>
            <button class="head-btn" id="btn-export">엑셀</button>
        </div>
    </div>

    <div id="inputs">
        <input type="date" id="hike-date">
        <input type="text" id="hike-location" placeholder="산 이름 (예: 지리산)">
    </div>

    <div id="map"></div>

    <div id="log-container">
        <h2><span>기록 리스트</span> <span id="history-count" style="color:var(--accent);">보관: 0건</span></h2>
        <div id="logs"></div>
    </div>

    <div id="controls">
        <button class="main-btn" id="btn-start">출발</button>
        <button class="main-btn" id="btn-record" disabled>시간기록</button>
        <button class="main-btn" id="btn-end" disabled>종료</button>
    </div>

    <script>
        const map = L.map('map').setView([36.5, 127.5], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentMarker = null;
        let routeCoords = [];
        let routeLine = L.polyline(routeCoords, {color: '#e74c3c', weight: 4}).addTo(map);
        
        let currentHike = { date: "", location: "", logs: [] };
        let hikeHistory = []; 

        const btnStart = document.getElementById('btn-start');
        const btnRecord = document.getElementById('btn-record');
        const btnEnd = document.getElementById('btn-end');
        const btnNew = document.getElementById('btn-new');
        const btnExport = document.getElementById('btn-export');
        const logsDiv = document.getElementById('logs');
        const dateInput = document.getElementById('hike-date');
        const locationInput = document.getElementById('hike-location');
        const historyCountDisplay = document.getElementById('history-count');

        window.onload = () => {
            // 오늘 날짜 기본값 세팅
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;

            const savedCurrent = localStorage.getItem('hikeApp_current');
            const savedHistory = localStorage.getItem('hikeApp_history');
            
            if (savedHistory) hikeHistory = JSON.parse(savedHistory);
            updateHistoryCount();

            if (savedCurrent) {
                currentHike = JSON.parse(savedCurrent);
                if(currentHike.date) dateInput.value = currentHike.date;
                locationInput.value = currentHike.location || '';
                
                currentHike.logs.forEach(log => {
                    if(log.lat && log.lng) {
                        routeCoords.push([parseFloat(log.lat), parseFloat(log.lng)]);
                    }
                });
                if(routeCoords.length > 0) {
                    map.setView(routeCoords[routeCoords.length-1], 16);
                    currentMarker = L.marker(routeCoords[routeCoords.length-1]).addTo(map);
                }
                routeLine.setLatLngs(routeCoords);
                renderLogs();

                if (currentHike.logs.length > 0 && currentHike.logs[currentHike.logs.length - 1].type !== '종료') {
                    btnStart.disabled = true; btnRecord.disabled = false; btnEnd.disabled = false;
                }
            } else {
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => { map.setView([pos.coords.latitude, pos.coords.longitude], 15); }, 
                        () => {}, { enableHighAccuracy: false }
                    );
                }
            }
        };

        function getCurrentTime() {
            return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function updateMap(lat, lng) {
            const latlng = [lat, lng];
            map.setView(latlng, 16); 
            if (!currentMarker) currentMarker = L.marker(latlng).addTo(map);
            else currentMarker.setLatLng(latlng);
            routeCoords.push(latlng);
            routeLine.setLatLngs(routeCoords);
        }

        function updateHistoryCount() {
            historyCountDisplay.innerText = `보관: ${hikeHistory.length}건`;
        }

        function saveCurrentState() {
            currentHike.date = dateInput.value;
            currentHike.location = locationInput.value;
            localStorage.setItem('hikeApp_current', JSON.stringify(currentHike));
        }

        function recordPoint(type, lat = "", lng = "") {
            let memo = "";
            if (type === '기록') {
                memo = prompt("지점 이름이나 메모를 입력하세요 (예: 삼거리, 대청봉 쉼터):", "");
                if (memo === null) memo = ""; // 취소 누르면 빈칸
            }
            
            const logItem = { id: Date.now(), type, time: getCurrentTime(), lat, lng, memo };
            currentHike.logs.push(logItem);
            saveCurrentState(); 
            renderLogs();
        }

        // 개별 기록 삭제 기능
        window.deleteLog = function(id) {
            if(confirm("이 지점 기록을 삭제하시겠습니까?")) {
                currentHike.logs = currentHike.logs.filter(log => log.id !== id);
                
                // 지도 경로선도 재계산
                routeCoords = [];
                currentHike.logs.forEach(log => {
                    if(log.lat && log.lng) routeCoords.push([parseFloat(log.lat), parseFloat(log.lng)]);
                });
                routeLine.setLatLngs(routeCoords);
                if(routeCoords.length > 0) currentMarker.setLatLng(routeCoords[routeCoords.length-1]);
                else if(currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }

                saveCurrentState();
                renderLogs();
            }
        }

        function renderLogs() {
            if (currentHike.logs.length === 0) {
                logsDiv.innerHTML = '<div style="color: var(--text-dim); text-align: center; margin-top: 15px; font-size: 13px;">기록이 없습니다.</div>';
                return;
            }
            logsDiv.innerHTML = '';
            [...currentHike.logs].reverse().forEach((log) => {
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                
                const displayMemo = log.memo ? ` - ${log.memo}` : '';
                const coordText = (log.lat && log.lng) ? `${log.lat}, ${log.lng}` : '';
                
                logEntry.innerHTML = `
                    <div class="log-left">
                        <span class="log-type">${log.type}</span>
                        <span class="log-time">${log.time}</span>
                        <span class="log-memo">${displayMemo}</span>
                    </div>
                    <div class="log-right">
                        <span class="log-coord">${coordText}</span>
                        <button class="btn-delete" onclick="deleteLog(${log.id})">×</button>
                    </div>
                `;
                logsDiv.appendChild(logEntry);
            });
        }

        function fetchLocationAndRecord(type) {
            if (!navigator.geolocation) return alert("위치 정보 미지원");
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(5);
                    const lng = position.coords.longitude.toFixed(5);
                    updateMap(lat, lng);
                    recordPoint(type, lat, lng);
                },
                () => {
                    alert("GPS 신호를 잡을 수 없습니다. 좌표 없이 기록합니다.");
                    recordPoint(type, "", "");
                },
                { enableHighAccuracy: true, timeout: 7000, maximumAge: 0 }
            );
        }

        btnStart.addEventListener('click', () => {
            btnStart.disabled = true; btnRecord.disabled = false; btnEnd.disabled = false;
            fetchLocationAndRecord('출발');
        });

        btnRecord.addEventListener('click', () => {
            fetchLocationAndRecord('기록');
        });

        btnEnd.addEventListener('click', () => {
            if(confirm("기록을 종료하시겠습니까?")) {
                btnStart.disabled = false; btnRecord.disabled = true; btnEnd.disabled = true;
                fetchLocationAndRecord('종료');
            }
        });

        btnNew.addEventListener('click', () => {
            if (currentHike.logs.length === 0) return alert("저장할 기록이 없습니다.");
            if(confirm("현재 기록을 보관함에 넣고 화면을 비웁니다.")) {
                hikeHistory.push(JSON.parse(JSON.stringify(currentHike)));
                localStorage.setItem('hikeApp_history', JSON.stringify(hikeHistory));
                updateHistoryCount();

                currentHike = { date: dateInput.value, location: "", logs: [] };
                localStorage.removeItem('hikeApp_current');
                
                locationInput.value = "";
                routeCoords = []; routeLine.setLatLngs([]);
                if(currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }
                renderLogs();
                btnStart.disabled = false; btnRecord.disabled = true; btnEnd.disabled = true;
            }
        });

        btnExport.addEventListener('click', () => {
            const allData = [...hikeHistory];
            if (currentHike.logs.length > 0) allData.push(currentHike);
            if (allData.length === 0) return alert("데이터가 없습니다.");

            let csvContent = "\uFEFF구분,일자,장소,시간,메모,위도,경도\n";
            allData.forEach(hike => {
                hike.logs.forEach(log => {
                    csvContent += `${log.type},${hike.date},${hike.location || "미입력"},${log.time},${log.memo || ""},${log.lat},${log.lng}\n`;
                });
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `등산기록_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        });

        [dateInput, locationInput].forEach(input => { input.addEventListener('input', saveCurrentState); });
    </script>
</body>
</html>
