<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>등산 기록</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #0D1117;
            --panel: #161B22;
            --panel2: #1C2330;
            --accent: #4ECDC4;
            --accent2: #FF6B35;
            --text: #E6EDF3;
            --text-dim: #7D8590;
            --border: #30363D;
            --success: #3FB950;
            --danger: #F85149;
            --radius: 10px;
            /* safe area 변수 — Samsung Internet용 constant() 병기 */
            --sat: constant(safe-area-inset-top);
            --sar: constant(safe-area-inset-right);
            --sab: constant(safe-area-inset-bottom);
            --sal: constant(safe-area-inset-left);
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        /* ── 터치 하이라이트 제거 (iOS/Android 공통) ── */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html {
            /* dvh: iOS Safari 주소창 포함 문제 해결. 미지원 브라우저는 100vh fallback */
            height: 100%;
            height: -webkit-fill-available;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex; flex-direction: column;
            /* 1) 일반 fallback */
            height: 100vh;
            /* 2) iOS Safari fill-available */
            height: -webkit-fill-available;
            /* 3) 최신 브라우저 dynamic viewport */
            height: 100dvh;
            background: var(--bg); color: var(--text);
            overflow: hidden;
            /* 데스크톱: 중앙 정렬 */
            max-width: 560px;
            margin-left: auto; margin-right: auto;
            /* 좌우 safe area 패딩 (노치 가로모드) */
            padding-left: var(--sal);
            padding-right: var(--sar);
        }

        /* 데스크톱용 바깥 배경 */
        html { background: #080C10; }

        /* ─── 헤더 ─── */
        #header {
            padding: 10px 14px;
            /* iOS 노치 대응 상단 패딩 */
            padding-top: max(10px, var(--sat));
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            z-index: 200; flex-shrink: 0;
        }
        #header-left { flex: 1; display: flex; flex-direction: column; gap: 1px; }
        #header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
        #status-bar { display: flex; align-items: center; gap: 6px; }
        #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
        #status-dot.active { background: var(--success); box-shadow: 0 0 0 2px rgba(63,185,80,0.25); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px rgba(63,185,80,0.25)} 50%{box-shadow:0 0 0 5px rgba(63,185,80,0.1)} }
        #status-text { font-size: 11px; color: var(--text-dim); }
        #timer-display { font-size: 11px; color: var(--accent); font-variant-numeric: tabular-nums; font-weight: 600; display: none; }

        /* ─── 헤더 메뉴 버튼 ─── */
        #btn-menu {
            background: var(--panel2); border: 1px solid var(--border);
            color: var(--text-dim); width: 36px; height: 36px;
            border-radius: 8px; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            /* 데스크톱 hover */
            transition: background 0.15s, transform 0.1s;
        }
        #btn-menu:hover { background: var(--border); color: var(--text); }
        #btn-menu:active { transform: scale(0.93); }

        /* ─── 드롭다운 ─── */
        #dropdown {
            position: fixed; top: max(54px, calc(var(--sat) + 54px)); right: 14px; z-index: 600;
            background: var(--panel2); border: 1px solid var(--border);
            border-radius: 11px; overflow: hidden;
            display: none; flex-direction: column;
            min-width: 160px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #dropdown.open { display: flex; }
        .dd-item {
            padding: 13px 16px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            color: var(--text); border: none; background: none;
            text-align: left; width: 100%;
            transition: background 0.1s;
        }
        /* 데스크톱 hover */
        .dd-item:hover { background: rgba(255,255,255,0.05); }
        .dd-item:active { background: var(--border); }
        .dd-item + .dd-item { border-top: 1px solid var(--border); }
        .dd-icon { font-size: 15px; }
        #dd-history-badge {
            margin-left: auto; background: var(--accent2); color: white;
            font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: none; align-items: center; justify-content: center; padding: 0 4px;
        }
        #dd-new-item { display: none; }

        /* ─── 입력 영역 ─── */
        #inputs {
            display: flex; gap: 6px; padding: 8px 14px;
            background: var(--bg); border-bottom: 1px solid var(--border);
            flex-shrink: 0; z-index: 100;
        }
        #inputs.hidden { display: none; }
        #inputs input {
            flex: 1; padding: 8px 10px;
            background: var(--panel2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 13px;
            transition: border-color 0.15s;
            /* iOS Safari: date input 기본 스타일 제거 */
            -webkit-appearance: none;
            appearance: none;
        }
        #inputs input:focus { outline: none; border-color: var(--accent); }
        /* 웹킷 달력 아이콘 다크 처리 */
        #hike-date::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; opacity: 0.7; }
        /* 데스크톱 hover */
        #inputs input:hover { border-color: rgba(255,255,255,0.2); }

        /* ─── 지도 ─── */
        #map-wrapper { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
        #map { flex: 1; width: 100%; z-index: 1; min-height: 0; }

        /* 지도 위 오버레이 */
        #map-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 10; pointer-events: none;
            padding: 6px 10px;
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .map-stat {
            background: rgba(13,17,23,0.85);
            /* Firefox는 backdrop-filter 미지원 → 폴백으로 불투명 배경 */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--border); border-radius: 7px;
            padding: 4px 10px; font-size: 11px; display: flex; align-items: center; gap: 4px;
        }
        @supports not (backdrop-filter: blur(1px)) {
            .map-stat { background: rgba(13,17,23,0.97); }
        }
        .map-stat-label { color: var(--text-dim); }
        .map-stat-val { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
        #map-layer-btn {
            position: absolute; top: 10px; right: 10px; z-index: 500;
            background: rgba(13,17,23,0.85); border: 1px solid var(--border);
            color: var(--text-dim); padding: 6px 10px; border-radius: 7px;
            font-size: 11px; cursor: pointer; font-weight: 600;
            transition: background 0.15s, color 0.15s;
        }
        #map-layer-btn:hover { background: var(--panel2); color: var(--text); }

        /* ─── 기록 리스트 ─── */
        #log-container {
            height: 28vh; overflow-y: auto; background: var(--bg);
            border-top: 1px solid var(--border); flex-shrink: 0;
            /* iOS Safari 관성 스크롤 */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        #log-header {
            position: sticky; top: 0; background: var(--bg);
            padding: 8px 14px 6px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 5;
        }
        #log-header-left { display: flex; align-items: center; gap: 8px; }
        #log-title { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        #log-count { font-size: 11px; color: var(--accent); font-weight: 600; background: rgba(78,205,196,0.1); padding: 2px 6px; border-radius: 5px; }
        #history-count { font-size: 11px; color: var(--text-dim); }
        #logs { padding: 6px 10px; }
        .log-entry {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 8px;
            background: var(--panel); margin-bottom: 5px; font-size: 13px;
        }
        .log-type-badge {
            font-size: 10px; font-weight: 700; padding: 2px 6px;
            border-radius: 5px; min-width: 32px; text-align: center; flex-shrink: 0;
        }
        .badge-출발 { background: rgba(63,185,80,0.15); color: var(--success); }
        .badge-기록 { background: rgba(78,205,196,0.15); color: var(--accent); }
        .badge-종료 { background: rgba(248,81,73,0.15); color: var(--danger); }
        .log-time { font-size: 11px; color: var(--text-dim); flex-shrink: 0; font-variant-numeric: tabular-nums; }
        .log-memo { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
        .log-coord { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
        .btn-delete {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 15px; padding: 0 3px; flex-shrink: 0;
            transition: color 0.15s;
            /* 모바일 탭 영역 확보 */
            min-width: 28px; min-height: 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete:hover { color: var(--danger); }
        #empty-log { color: var(--text-dim); text-align: center; padding: 20px 10px; font-size: 12px; display: none; }
        #empty-log.show { display: block; }

        /* ─── 하단 컨트롤 ─── */
        #controls {
            background: var(--panel); border-top: 1px solid var(--border);
            padding: 12px 16px;
            /* iOS 홈 인디케이터 대응 — constant() 먼저, env() 덮어쓰기 */
            padding-bottom: max(12px, constant(safe-area-inset-bottom));
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            z-index: 200; flex-shrink: 0;
        }

        /* 대기 중 */
        #ctrl-idle { display: flex; flex-direction: column; gap: 8px; }
        #btn-start {
            width: 100%; padding: 16px 0;
            font-size: 16px; font-weight: 800; letter-spacing: 0.3px;
            border-radius: 12px; border: none; color: white; cursor: pointer;
            background: linear-gradient(135deg, #1E8449, #27AE60);
            transition: transform 0.12s, filter 0.12s;
        }
        #btn-start:hover { filter: brightness(1.08); }
        #btn-start:active { transform: scale(0.98); }

        /* 산행 중 */
        #ctrl-active { display: none; gap: 10px; align-items: stretch; }
        #btn-record {
            flex: 1; padding: 18px 0;
            font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
            border-radius: 12px; border: none; color: #0D1117; cursor: pointer;
            background: linear-gradient(135deg, #1A8A83, #4ECDC4);
            transition: transform 0.12s, filter 0.12s;
        }
        #btn-record:hover { filter: brightness(1.08); }
        #btn-record:active { transform: scale(0.97); }
        #btn-record-label { font-size: 10px; font-weight: 500; opacity: 0.7; display: block; margin-top: 2px; }
        #btn-end {
            flex: 0 0 64px; padding: 0;
            border-radius: 12px; border: 2px solid rgba(248,81,73,0.4);
            background: rgba(248,81,73,0.08); color: var(--danger);
            cursor: pointer; font-size: 11px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; transition: all 0.15s;
        }
        #btn-end:hover { background: rgba(248,81,73,0.18); border-color: rgba(248,81,73,0.7); }
        #btn-end:active { transform: scale(0.96); }
        #btn-end-icon { font-size: 20px; line-height: 1; }
        #btn-end:disabled, #btn-record:disabled { opacity: 0.3; pointer-events: none; }

        /* ─── 이력 패널 ─── */
        #history-panel {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.6); display: none; align-items: flex-end;
        }
        #history-panel.open { display: flex; }
        #history-sheet {
            width: 100%; background: var(--panel);
            border-radius: 18px 18px 0 0; border-top: 1px solid var(--border);
            max-height: 75vh; display: flex; flex-direction: column;
            /* iOS 패널 하단 safe area */
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #history-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 4px; }
        #history-sheet-header {
            padding: 8px 16px 10px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        #history-sheet-title { font-size: 14px; font-weight: 700; }
        #btn-close-history {
            background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 0;
            transition: color 0.15s;
        }
        #btn-close-history:hover { color: var(--text); }
        #history-list {
            overflow-y: auto; padding: 10px 12px; flex: 1;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .history-item {
            padding: 10px 12px; border-radius: 9px; background: var(--panel2);
            margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer;
            transition: border-color 0.15s;
        }
        .history-item:hover { border-color: rgba(78,205,196,0.4); }
        .history-item:active { border-color: var(--accent); }
        .history-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .history-item-name { font-size: 14px; font-weight: 700; }
        .history-item-date { font-size: 11px; color: var(--text-dim); }
        .history-item-stats { display: flex; gap: 12px; flex-wrap: wrap; }
        .history-item-stat { font-size: 11px; color: var(--text-dim); }
        .history-item-stat span { color: var(--accent); font-weight: 600; }
        .btn-del-history {
            background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; margin-left: 8px;
            transition: color 0.15s;
        }
        .btn-del-history:hover { color: var(--danger); }

        /* ─── 데스크톱 가로모드 / 태블릿 레이아웃 ─── */
        @media (min-width: 560px) {
            body { border-left: 1px solid #1C2330; border-right: 1px solid #1C2330; }
        }

        /* 가로 모드 (모바일 landscape) — 기록창 높이 축소, 버튼 컴팩트 */
        @media (max-height: 500px) and (orientation: landscape) {
            #log-container { height: 22vh; }
            #btn-start { padding: 11px 0; font-size: 14px; }
            #btn-record { padding: 12px 0; font-size: 15px; }
            #btn-record-label { display: none; }
            #btn-end { flex: 0 0 56px; }
            #controls { padding-top: 8px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
            #inputs { padding: 6px 14px; }
            #inputs input { padding: 6px 10px; }
        }

        /* 접근성: 시스템 다크모드 강제 사용 시 (이미 다크 테마이므로 유지) */
        @media (prefers-color-scheme: light) {
            /* 라이트모드 환경에서도 앱 자체는 다크 유지 (등산 앱 특성상) */
        }

        /* 접근성: 애니메이션 줄이기 설정 시 pulse 제거 */
        @media (prefers-reduced-motion: reduce) {
            #status-dot.active { animation: none; }
            * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

<div id="header">
    <div id="header-left">
        <div id="header-title">⛰ 등산 기록</div>
        <div id="status-bar">
            <div id="status-dot"></div>
            <span id="status-text">대기 중</span>
            <span id="timer-display">00:00:00</span>
        </div>
    </div>
    <button id="btn-menu" onclick="toggleDropdown()" aria-label="메뉴">···</button>
</div>

<div id="dropdown">
    <button class="dd-item" id="dd-history-item" onclick="ddAction('history')">
        <span class="dd-icon">🗂</span> 보관함
        <span id="dd-history-badge"></span>
    </button>
    <button class="dd-item" onclick="ddAction('export')">
        <span class="dd-icon">📊</span> 엑셀 내보내기
    </button>
    <button class="dd-item" id="dd-new-item" onclick="ddAction('new')">
        <span class="dd-icon">🔄</span> 새 산행 시작
    </button>
</div>
<div id="dropdown-backdrop" onclick="closeDropdown()" style="display:none;position:fixed;inset:0;z-index:599;"></div>

<div id="inputs">
    <input type="date" id="hike-date">
    <input type="text" id="hike-location" placeholder="산 이름 (예: 지리산)">
</div>

<div id="map-wrapper">
    <div id="map"></div>
    <div id="map-overlay">
        <div class="map-stat"><span class="map-stat-label">누적거리</span><span class="map-stat-val" id="stat-dist">0.00km</span></div>
        <div class="map-stat"><span class="map-stat-label">지점수</span><span class="map-stat-val" id="stat-pts">0</span></div>
    </div>
    <button id="map-layer-btn" onclick="toggleMapLayer()">위성</button>
</div>

<div id="log-container">
    <div id="log-header">
        <div id="log-header-left">
            <span id="log-title">기록</span>
            <span id="log-count">0</span>
        </div>
        <span id="history-count">보관: 0건</span>
    </div>
    <div id="empty-log" class="show">출발 버튼을 눌러 산행을 시작하세요.</div>
    <div id="logs"></div>
</div>

<div id="controls">
    <div id="ctrl-idle">
        <button id="btn-start">🥾 산행 출발</button>
    </div>
    <div id="ctrl-active">
        <button id="btn-record">
            📍 지점 기록
            <span id="btn-record-label">탭하여 현재 위치 저장</span>
        </button>
        <button id="btn-end">
            <span id="btn-end-icon">🏁</span>
            종료
        </button>
    </div>
</div>

<div id="history-panel">
    <div id="history-sheet">
        <div id="history-sheet-handle"></div>
        <div id="history-sheet-header">
            <span id="history-sheet-title">보관된 산행</span>
            <button id="btn-close-history" onclick="closeHistory()">×</button>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    /* ── 지도 초기화 ── */
    const map = L.map('map', { zoomControl: false }).setView([36.5, 127.5], 7);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    const tileNormal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    const tileSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri' });
    tileNormal.addTo(map);
    let isSatellite = false;

    window.toggleMapLayer = function() {
        if (isSatellite) { map.removeLayer(tileSatellite); tileNormal.addTo(map); document.getElementById('map-layer-btn').textContent = '위성'; }
        else { map.removeLayer(tileNormal); tileSatellite.addTo(map); document.getElementById('map-layer-btn').textContent = '지도'; }
        isSatellite = !isSatellite;
    };

    /* ── Android 소프트키보드 대응: 키보드가 올라오면 지도 resize ── */
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const vh = window.visualViewport.height;
            document.body.style.height = vh + 'px';
            map.invalidateSize();
        });
    }

    /* ── 상태 ── */
    let currentMarker = null;
    let routeCoords = [];
    let routeLine = L.polyline(routeCoords, { color: '#4ECDC4', weight: 4, opacity: 0.85 }).addTo(map);
    let currentHike = { date: '', location: '', logs: [] };
    let hikeHistory = [];
    let timerInterval = null;
    let startTimestamp = null;

    const btnStart      = document.getElementById('btn-start');
    const btnRecord     = document.getElementById('btn-record');
    const btnEnd        = document.getElementById('btn-end');
    const dateInput     = document.getElementById('hike-date');
    const locationInput = document.getElementById('hike-location');
    const logsDiv       = document.getElementById('logs');
    const historyCountDisplay = document.getElementById('history-count');
    const statusDot     = document.getElementById('status-dot');
    const statusText    = document.getElementById('status-text');
    const timerDisplay  = document.getElementById('timer-display');
    const ctrlIdle      = document.getElementById('ctrl-idle');
    const ctrlActive    = document.getElementById('ctrl-active');
    const inputsDiv     = document.getElementById('inputs');

    /* ── 드롭다운 ── */
    window.toggleDropdown = function() {
        const dd = document.getElementById('dropdown');
        const bd = document.getElementById('dropdown-backdrop');
        const isOpen = dd.classList.contains('open');
        if (isOpen) { dd.classList.remove('open'); bd.style.display = 'none'; }
        else { dd.classList.add('open'); bd.style.display = 'block'; }
    };
    window.closeDropdown = function() {
        document.getElementById('dropdown').classList.remove('open');
        document.getElementById('dropdown-backdrop').style.display = 'none';
    };
    window.ddAction = function(action) {
        closeDropdown();
        if (action === 'history') openHistory();
        else if (action === 'export') doExport();
        else if (action === 'new') doNewHike();
    };

    /* ── 유틸 ── */
    function getCurrentTime() {
        return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    function haversineKm(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function calcTotalDist(logs) {
        let total = 0;
        const pts = logs.filter(l => l.lat && l.lng);
        for (let i = 1; i < pts.length; i++)
            total += haversineKm(parseFloat(pts[i-1].lat), parseFloat(pts[i-1].lng), parseFloat(pts[i].lat), parseFloat(pts[i].lng));
        return total;
    }
    function updateMapStats() {
        const dist = calcTotalDist(currentHike.logs);
        document.getElementById('stat-dist').textContent = dist.toFixed(2) + 'km';
        document.getElementById('stat-pts').textContent = currentHike.logs.length;
        document.getElementById('log-count').textContent = currentHike.logs.length;
    }
    function updateHistoryCount() {
        historyCountDisplay.innerText = `보관: ${hikeHistory.length}건`;
        const badge = document.getElementById('dd-history-badge');
        if (hikeHistory.length > 0) { badge.style.display = 'flex'; badge.textContent = hikeHistory.length; }
        else { badge.style.display = 'none'; }
    }
    function saveCurrentState() {
        currentHike.date = dateInput.value;
        currentHike.location = locationInput.value;
        localStorage.setItem('hikeApp_current', JSON.stringify(currentHike));
        if (startTimestamp) localStorage.setItem('hikeApp_startTs', startTimestamp.toString());
    }

    /* ── 타이머 ── */
    function startTimer(fromTs) {
        startTimestamp = fromTs || Date.now();
        timerDisplay.style.display = 'inline';
        resumeTimer();
        document.addEventListener('visibilitychange', onVisibilityChange);
    }
    function resumeTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
            const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${h}:${m}:${s}`;
        }, 1000);
    }
    function onVisibilityChange() {
        if (document.hidden) { clearInterval(timerInterval); timerInterval = null; }
        else { if (startTimestamp) resumeTimer(); }
    }
    function stopTimer() {
        clearInterval(timerInterval); timerInterval = null;
        document.removeEventListener('visibilitychange', onVisibilityChange);
        timerDisplay.style.display = 'none';
        startTimestamp = null;
        localStorage.removeItem('hikeApp_startTs');
    }

    /* ── 상태 전환 ── */
    function setActiveState(active) {
        statusDot.className = active ? 'active' : '';
        statusText.textContent = active ? '산행 중' : '대기 중';
        ctrlIdle.style.display   = active ? 'none' : 'flex';
        ctrlActive.style.display = active ? 'flex' : 'none';
        inputsDiv.classList.toggle('hidden', active);
        document.getElementById('dd-new-item').style.display =
            (!active && currentHike.logs.length > 0) ? 'flex' : 'none';
        /* 상태 전환 후 지도 크기 재계산 */
        setTimeout(() => map.invalidateSize(), 50);
    }

    let userMovedMap = false;
    map.on('dragstart', () => { userMovedMap = true; });

    function updateMap(lat, lng) {
        const latlng = [lat, lng];
        if (!currentMarker) {
            currentMarker = L.marker(latlng).addTo(map);
            map.setView(latlng, 16);
            userMovedMap = false;
        } else {
            currentMarker.setLatLng(latlng);
            if (!userMovedMap) map.setView(latlng, map.getZoom());
        }
        routeCoords.push(latlng);
        routeLine.setLatLngs(routeCoords);
    }

    /* ── 기록 ── */
    function recordPoint(type, lat = '', lng = '', memo = '') {
        const logItem = { id: Date.now(), type, time: getCurrentTime(), lat, lng, memo };
        currentHike.logs.push(logItem);
        saveCurrentState(); renderLogs(); updateMapStats();
    }
    function fetchLocationAndRecord(type, memo = '') {
        if (!navigator.geolocation) return alert('위치 정보 미지원');
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude.toFixed(5);
                const lng = pos.coords.longitude.toFixed(5);
                updateMap(parseFloat(lat), parseFloat(lng));
                recordPoint(type, lat, lng, memo);
            },
            () => { alert('GPS 신호를 잡을 수 없습니다. 좌표 없이 기록합니다.'); recordPoint(type, '', '', memo); },
            { enableHighAccuracy: true, timeout: 7000, maximumAge: 30000 }
        );
    }

    /* ── 삭제 ── */
    window.deleteLog = function(id) {
        if (!confirm('이 지점 기록을 삭제하시겠습니까?')) return;
        currentHike.logs = currentHike.logs.filter(l => l.id !== id);
        routeCoords = [];
        currentHike.logs.forEach(l => { if (l.lat && l.lng) routeCoords.push([parseFloat(l.lat), parseFloat(l.lng)]); });
        routeLine.setLatLngs(routeCoords);
        if (routeCoords.length > 0 && currentMarker) currentMarker.setLatLng(routeCoords[routeCoords.length-1]);
        else if (currentMarker && routeCoords.length === 0) { map.removeLayer(currentMarker); currentMarker = null; }
        saveCurrentState(); renderLogs(); updateMapStats();
        document.getElementById('dd-new-item').style.display = (currentHike.logs.length > 0) ? 'flex' : 'none';
    };

    /* ── 렌더링 ── */
    function renderLogs() {
        const emptyEl = document.getElementById('empty-log');
        if (currentHike.logs.length === 0) { emptyEl.classList.add('show'); logsDiv.innerHTML = ''; return; }
        emptyEl.classList.remove('show');
        logsDiv.innerHTML = '';
        [...currentHike.logs].reverse().forEach(log => {
            const el = document.createElement('div');
            el.className = 'log-entry';
            const memoText = log.memo ? log.memo : (log.type === '출발' ? '산행 시작' : log.type === '종료' ? '산행 종료' : '지점');
            const coordText = (log.lat && log.lng) ? `${parseFloat(log.lat).toFixed(3)},${parseFloat(log.lng).toFixed(3)}` : '좌표없음';
            el.innerHTML = `
                <span class="log-type-badge badge-${log.type}">${log.type}</span>
                <span class="log-time">${log.time}</span>
                <span class="log-memo">${memoText}</span>
                <span class="log-coord">${coordText}</span>
                <button class="btn-delete" onclick="deleteLog(${log.id})" aria-label="삭제">×</button>
            `;
            logsDiv.appendChild(el);
        });
    }

    /* ── 이력 패널 ── */
    function openHistory() {
        renderHistoryList();
        document.getElementById('history-panel').classList.add('open');
    }
    window.closeHistory = function() { document.getElementById('history-panel').classList.remove('open'); };
    function renderHistoryList() {
        const list = document.getElementById('history-list');
        if (hikeHistory.length === 0) { list.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:30px;font-size:13px;">저장된 산행이 없습니다.</div>'; return; }
        list.innerHTML = '';
        [...hikeHistory].reverse().forEach((hike, ri) => {
            const i = hikeHistory.length - 1 - ri;
            const dist = calcTotalDist(hike.logs);
            const startLog = hike.logs.find(l => l.type === '출발');
            const endLog   = hike.logs.find(l => l.type === '종료');
            const el = document.createElement('div');
            el.className = 'history-item';
            el.innerHTML = `
                <div class="history-item-top">
                    <span class="history-item-name">${hike.location || '이름없음'}</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span class="history-item-date">${hike.date}</span>
                        <button class="btn-del-history" onclick="deleteHistory(${i},event)" aria-label="산행 삭제">×</button>
                    </div>
                </div>
                <div class="history-item-stats">
                    <span class="history-item-stat">지점 <span>${hike.logs.length}개</span></span>
                    <span class="history-item-stat">거리 <span>${dist.toFixed(2)}km</span></span>
                    ${startLog ? `<span class="history-item-stat">출발 <span>${startLog.time}</span></span>` : ''}
                    ${endLog   ? `<span class="history-item-stat">종료 <span>${endLog.time}</span></span>` : ''}
                </div>
            `;
            list.appendChild(el);
        });
    }
    window.deleteHistory = function(i, e) {
        e.stopPropagation();
        if (!confirm('이 기록을 영구 삭제하시겠습니까?')) return;
        hikeHistory.splice(i, 1);
        localStorage.setItem('hikeApp_history', JSON.stringify(hikeHistory));
        updateHistoryCount(); renderHistoryList();
    };

    /* ── 내보내기 ── */
    function doExport() {
        const allData = [...hikeHistory];
        if (currentHike.logs.length > 0) allData.push(currentHike);
        if (allData.length === 0) return alert('데이터가 없습니다.');
        let csv = '\uFEFF구분,일자,장소,시간,메모,위도,경도,거리누적km\n';
        allData.forEach(hike => {
            let cumDist = 0;
            hike.logs.forEach((log, i) => {
                if (i > 0 && log.lat && log.lng) {
                    const prev = hike.logs.slice(0, i).reverse().find(l => l.lat && l.lng);
                    if (prev) cumDist += haversineKm(parseFloat(prev.lat), parseFloat(prev.lng), parseFloat(log.lat), parseFloat(log.lng));
                }
                csv += `${log.type},${hike.date},${hike.location||'미입력'},${log.time},${log.memo||''},${log.lat||''},${log.lng||''},${cumDist.toFixed(3)}\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `등산기록_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    }

    /* ── 새 산행 ── */
    function doNewHike() {
        if (currentHike.logs.length === 0) return alert('저장할 기록이 없습니다.');
        if (!confirm('현재 기록을 보관함에 넣고 새 산행을 시작합니까?')) return;
        hikeHistory.push(JSON.parse(JSON.stringify(currentHike)));
        localStorage.setItem('hikeApp_history', JSON.stringify(hikeHistory));
        updateHistoryCount();
        currentHike = { date: dateInput.value, location: '', logs: [] };
        localStorage.removeItem('hikeApp_current');
        locationInput.value = '';
        routeCoords = []; routeLine.setLatLngs([]);
        if (currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }
        stopTimer(); setActiveState(false); renderLogs(); updateMapStats();
    }

    /* ── 버튼 이벤트 ── */
    btnStart.addEventListener('click', () => {
        if (currentHike.logs.length > 0) {
            if (!confirm('이전 기록이 있습니다. 보관함에 저장하고 새 산행을 시작합니까?')) return;
            hikeHistory.push(JSON.parse(JSON.stringify(currentHike)));
            localStorage.setItem('hikeApp_history', JSON.stringify(hikeHistory));
            updateHistoryCount();
            currentHike = { date: dateInput.value, location: '', logs: [] };
            localStorage.removeItem('hikeApp_current');
            locationInput.value = '';
            routeCoords = []; routeLine.setLatLngs([]);
            if (currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }
            renderLogs(); updateMapStats();
        }
        setActiveState(true);
        startTimer();
        fetchLocationAndRecord('출발');
    });

    btnRecord.addEventListener('click', () => {
        const memo = prompt('지점 이름 또는 메모 (예: 삼거리, 대청봉):', '');
        if (memo === null) return;
        fetchLocationAndRecord('기록', memo);
    });

    btnEnd.addEventListener('click', () => {
        if (!confirm('산행을 종료하시겠습니까?')) return;
        btnEnd.disabled = true; btnRecord.disabled = true;
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude.toFixed(5);
                const lng = pos.coords.longitude.toFixed(5);
                updateMap(parseFloat(lat), parseFloat(lng));
                recordPoint('종료', lat, lng, '');
                setActiveState(false); stopTimer();
                btnEnd.disabled = false; btnRecord.disabled = false;
            },
            () => {
                alert('GPS 신호를 잡을 수 없습니다. 좌표 없이 기록합니다.');
                recordPoint('종료', '', '', '');
                setActiveState(false); stopTimer();
                btnEnd.disabled = false; btnRecord.disabled = false;
            },
            { enableHighAccuracy: true, timeout: 7000, maximumAge: 30000 }
        );
    });

    document.getElementById('history-panel').addEventListener('click', (e) => {
        if (e.target === document.getElementById('history-panel')) closeHistory();
    });
    [dateInput, locationInput].forEach(el => el.addEventListener('input', saveCurrentState));

    /* ── 초기화 ── */
    window.onload = () => {
        dateInput.value = new Date().toISOString().split('T')[0];
        const savedHistory = localStorage.getItem('hikeApp_history');
        if (savedHistory) hikeHistory = JSON.parse(savedHistory);
        updateHistoryCount();
        const savedCurrent = localStorage.getItem('hikeApp_current');
        if (savedCurrent) {
            currentHike = JSON.parse(savedCurrent);
            if (currentHike.date) dateInput.value = currentHike.date;
            locationInput.value = currentHike.location || '';
            currentHike.logs.forEach(log => {
                if (log.lat && log.lng) routeCoords.push([parseFloat(log.lat), parseFloat(log.lng)]);
            });
            if (routeCoords.length > 0) {
                map.setView(routeCoords[routeCoords.length-1], 16);
                currentMarker = L.marker(routeCoords[routeCoords.length-1]).addTo(map);
                routeLine.setLatLngs(routeCoords);
            }
            renderLogs(); updateMapStats();
            const lastLog = currentHike.logs[currentHike.logs.length - 1];
            if (lastLog && lastLog.type !== '종료') {
                setActiveState(true);
                const savedTs = localStorage.getItem('hikeApp_startTs');
                startTimer(savedTs ? parseInt(savedTs) : Date.now());
            } else {
                setActiveState(false);
            }
        } else {
            setActiveState(false);
            navigator.geolocation && navigator.geolocation.getCurrentPosition(
                pos => map.setView([pos.coords.latitude, pos.coords.longitude], 15),
                () => {}, { enableHighAccuracy: false }
            );
        }
        updateMapStats();
    };
</script>
</body>
</html>
